<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile | ServiceDesk</title>
    <script type="module" src="/src/pages/profile/profile.ts"></script>
    <script type="module" src="/src/style/global.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen">
    
    <div id="sidebar-container"></div>

    <main class="ml-64 p-10 max-w-5xl">
        <!-- Profile Header Section -->
        <header class="mb-10 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <div class="relative">
                    <img id="profile-avatar" class="w-24 h-24 rounded-3xl object-cover ring-4 ring-white shadow-xl shadow-blue-500/10" src="" alt="User Avatar">
                    <div class="absolute -bottom-2 -right-2 bg-blue-600 text-white p-1.5 rounded-xl shadow-lg border-2 border-white">
                        <span class="material-icons-round text-sm">verified</span>
                    </div>
                </div>
                <div>
                    <h1 class="text-3xl font-black text-slate-900 tracking-tight" id="header-name">---</h1>
                    <p class="text-slate-500 font-medium flex items-center gap-1">
                        <span class="material-icons-round text-sm">business_center</span>
                        <span id="header-dept">---</span>
                    </p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Left Column: Personal Info -->
            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="p-2 bg-blue-50 rounded-xl text-blue-600">
                            <span class="material-icons-round">contact_mail</span>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Account Details</h2>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Full Name</label>
                            <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-bold" id="user-name">---</div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Work Email</label>
                            <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl text-slate-700 font-bold" id="user-email">---</div>
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">System Role</label>
                            <div class="p-4 bg-slate-50 border border-slate-200 rounded-2xl">
                                <span id="user-role" class="px-3 py-1 bg-blue-100 text-blue-700 text-[10px] font-black rounded-lg border border-blue-200 uppercase tracking-tighter">---</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Security -->
            <div class="space-y-8">
                <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-200">
                    <div class="flex items-center gap-3 mb-8">
                        <div class="p-2 bg-amber-50 rounded-xl text-amber-500">
                            <span class="material-icons-round">shield</span>
                        </div>
                        <h2 class="text-xl font-bold text-slate-800">Security</h2>
                    </div>

                    <form id="password-form" class="space-y-5">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Current Password</label>
                            <input type="password" id="old-password" required placeholder="••••••••"
                                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-medium">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">New Password</label>
                            <input type="password" id="new-password" required placeholder="••••••••"
                                class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all font-medium">
                        </div>
                        <button type="submit" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-slate-800 transition-all active:scale-[0.98]">
                            Update Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
