<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Dashboard | ServiceDesk</title>
    <!-- Scripts no topo (o navegador carrega mas espera o HTML terminar para executar) -->
    <script type="module" src="/src/pages/dashboard/dashboard.ts"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="sidebar-container"></div>
    <main class="ml-64 p-10">
        <header class="mb-10">
            <h1 class="text-3xl font-black text-slate-900 tracking-tight">System Overview</h1>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <!-- Card 1: Active Tickets -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <span class="material-icons-round text-blue-600 mb-2">confirmation_number</span>
                <p class="text-slate-400 text-xs font-bold uppercase">Active Tickets</p>
                <h3 class="text-3xl font-black text-slate-900" id="stat-tickets">0</h3>
            </div>
            <!-- Card 2: Resolved -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <span class="material-icons-round text-emerald-600 mb-2">check_circle</span>
                <p class="text-slate-400 text-xs font-bold uppercase">Resolved</p>
                <h3 class="text-3xl font-black text-slate-900" id="stat-resolved">0</h3>
            </div>
            <!-- Card 3: Users -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <span class="material-icons-round text-purple-600 mb-2">group</span>
                <p class="text-slate-400 text-xs font-bold uppercase">Users</p>
                <h3 class="text-3xl font-black text-slate-900" id="stat-users">0</h3>
            </div>
            <!-- Card 4: Rating -->
            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                <span class="material-icons-round text-amber-500 mb-2">stars</span>
                <p class="text-slate-400 text-xs font-bold uppercase">Avg Rating</p>
                <h3 class="text-3xl font-black text-slate-900" id="stat-rating">0.0</h3>
            </div>
        </div>
    </main>
</body>
</html>
