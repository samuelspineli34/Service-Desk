<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tickets | ServiceDesk</title>
    <script type="module" src="/src/pages/ticket/tickets.ts"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="sidebar-container"></div>

    <main class="ml-64 p-10">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Tickets</h1>
                <p class="text-slate-500 font-medium">Manage and track support requests.</p>
            </div>
            <button onclick="window.openTicketModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all flex items-center gap-2">
                <span class="material-icons-round">add</span> New Ticket
            </button>
        </header>

        <div class="bg-white rounded-[2rem] shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50/50 border-b border-slate-100">
                    <tr>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Ticket Info</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Status</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Priority</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Rating</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest">Owner</th>
                        <th class="px-8 py-5 text-[10px] font-black text-slate-400 uppercase tracking-widest text-right">Actions</th>
                    </tr>
                </thead>
                <tbody id="ticket-list" class="divide-y divide-slate-50">
                    <!-- Dynamic Rows -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- TICKET MODAL -->
    <div id="ticket-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 mb-8">New Ticket</h2>
            <form id="ticket-form" class="space-y-6">
                <input type="hidden" id="field-id">
                
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Subject</label>
                    <input type="text" id="field-title" required placeholder="What needs help?" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold">
                </div>

                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Description</label>
                    <textarea id="field-desc" rows="3" placeholder="Provide more details..." class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-medium"></textarea>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Status</label>
                        <select id="field-status" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none">
                            <option value="OPEN">OPEN</option>
                            <option value="IN_PROGRESS">IN PROGRESS</option>
                            <option value="CLOSED">CLOSED</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Priority</label>
                        <select id="field-priority" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none">
                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-1.5" id="user-assign-container">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Assign To User</label>
                    <select id="field-user" class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl font-bold outline-none"></select>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="window.closeTicketModal()" class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600">Cancel</button>
                    <button type="submit" class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 active:scale-95 transition-all">
                        Save Ticket
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
