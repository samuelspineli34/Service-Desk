<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <title>Tickets | ServiceDesk</title>
    <script type="module" src="/src/pages/ticket/ticket.ts"></script>
    <script type="module" src="/src/style/global.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>
<body class="bg-slate-50 min-h-screen">
    <div id="sidebar-container"></div>
    <main class="ml-64 p-10">
        <header class="mb-8 flex justify-between items-end">
            <div>
                <h1 class="text-3xl font-black text-slate-900 tracking-tight">Tickets</h1>
                <p class="text-slate-500">Manage support requests</p>
            </div>
            <button onclick="window.openTicketModal()" class="bg-blue-600 text-white px-5 py-2.5 rounded-xl font-bold shadow-lg hover:bg-blue-700 flex items-center gap-2">
                <span class="material-icons-round">add</span> New Ticket
            </button>
        </header>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-slate-50 border-b border-slate-200">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Title</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Status</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Priority</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Assigned To</th>
                        <th class="px-6 py-4 text-xs font-bold text-slate-400 uppercase">Actions</th>
                    </tr>
                </thead>
                <tbody id="ticket-list"></tbody>
            </table>
        </div>
    </main>

    <!-- TICKET MODAL -->
    <div id="ticket-modal" class="hidden fixed inset-0 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center z-[100]">
        <div class="bg-white w-full max-w-lg rounded-2xl p-8">
            <h2 id="modal-title" class="text-2xl font-bold mb-6">New Ticket</h2>
            <form id="ticket-form" class="space-y-4">
                <input type="hidden" id="field-id">
                <input type="text" id="field-title" placeholder="Subject" required class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500">
                <textarea id="field-desc" placeholder="Description" rows="3" class="w-full p-3 border rounded-xl outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                <div class="grid grid-cols-2 gap-4">
                    <select id="field-status" class="p-3 border rounded-xl"><option value="OPEN">OPEN</option><option value="IN_PROGRESS">IN PROGRESS</option><option value="CLOSED">CLOSED</option></select>
                    <select id="field-priority" class="p-3 border rounded-xl"><option value="LOW">LOW</option><option value="MEDIUM">MEDIUM</option><option value="HIGH">HIGH</option></select>
                </div>
                <select id="field-user" class="w-full p-3 border rounded-xl bg-slate-50 font-medium"></select>
                <div class="flex justify-end gap-3 mt-6">
                    <button type="button" onclick="window.closeTicketModal()" class="px-4 py-2 font-bold text-slate-400">Cancel</button>
                    <button type="submit" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold shadow-lg">Save Ticket</button>
                </div>
            </form>
        </div>
    </div>
    
</body>
</html>
