<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ServiceDesk</title>
    
    <!-- Scripts no topo como solicitado -->
    <script type="module" src="/src/pages/login/login.ts"></script>
    <script type="module" src="/src/style/global.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    
    <style>
        /* Adicionando uma fonte mais elegante */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[radial-gradient(ellipse_at_top_left,_var(--tw-gradient-stops))] from-slate-900 via-slate-900 to-blue-900 min-h-screen flex items-center justify-center p-6">

    <div class="w-full max-w-[440px]">
        <!-- Logo / Brand Area -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-3xl shadow-xl shadow-blue-500/20 mb-4">
                <img src="/agent.png" alt="Agent" class="w-20 h-20">
            </div>
            <h1 class="text-4xl font-extrabold text-white tracking-tight">Osaka Tech</h1>
            <p class="text-slate-400 mt-2 font-medium">Internal Corporate Support Portal</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-10 border border-white/20">
            <div class="mb-8">
                <h2 class="text-2xl font-bold text-slate-800">Welcome Back</h2>
                <p class="text-slate-500 text-sm mt-1">Please enter your credentials to continue.</p>
            </div>
            
            <form id="login-form" class="space-y-5">
                <!-- Email Field -->
                <div class="space-y-1.5">
                    <label class="text-xs font-black uppercase tracking-widest text-slate-400 ml-1">Email Address</label>
                    <div class="relative group">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors">email</span>
                        <input type="email" id="email" placeholder="name@company.com" required 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-slate-700 placeholder:text-slate-300 font-medium">
                    </div>
                </div>

                <!-- Password Field -->
                <div class="space-y-1.5">
                    <div class="flex justify-between items-center px-1">
                        <label class="text-xs font-black uppercase tracking-widest text-slate-400">Password</label>
                    </div>
                    <div class="relative group">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-blue-600 transition-colors">lock</span>
                        <input type="password" id="password" placeholder="••••••••" required 
                            class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 outline-none transition-all text-slate-700 placeholder:text-slate-300 font-medium">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center px-1 py-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500 cursor-pointer">
                    <label for="remember" class="ml-2 text-sm font-medium text-slate-500 cursor-pointer select-none">Keep me signed in</label>
                </div>

                <!-- Submit Button -->
                <button type="submit" class="group relative w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/25 transition-all active:scale-[0.98] overflow-hidden">
                    <div class="flex items-center justify-center gap-2">
                        <span>Sign into Dashboard</span>
                        <span class="material-icons-round text-xl group-hover:translate-x-1 transition-transform">arrow_forward</span>
                    </div>
                </button>
            </form>
        </div>

        <!-- Footer Info -->
        <p class="text-center text-slate-500 text-sm mt-8">
            &copy; 2026 OsakaCorp ServiceDesk. <br>
            <span class="opacity-50">Confidential System - Authorized Access Only</span>
        </p>
    </div>

</body>
</html>
