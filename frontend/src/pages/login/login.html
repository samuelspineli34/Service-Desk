<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Osaka Tech</title>
    <script type="module" src="/src/pages/login/login.ts"></script>
    <script type="module" src="/src/style/global.css"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: transparent !important; }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center p-6 antialiased">

    <!-- Loader -->
    <div id="global-loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-[#fdfaf3]/90 backdrop-blur-sm">
        <div class="h-10 w-10 rounded-full border-4 border-orange-200 border-t-[#d97706] animate-spin"></div>
    </div>

    <div class="w-full max-w-[440px] animate-in">
        <!-- Logo Area -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-white rounded-[2.2rem] shadow-xl mb-6 ring-4 ring-orange-200/50">
                <img src="/agent.png" alt="Agent" class="w-16 h-16">
            </div>
            <h1 class="text-4xl font-[900] text-[#2d1a0f] tracking-tighter">Osaka Tech</h1>
            <p class="text-[#d97706] mt-1 font-black uppercase text-[11px] tracking-[0.4em]">Support Portal</p>
        </div>

        <!-- Login Card -->
        <!-- Borda mais forte no card: border-orange-200 -->
        <div class="bg-white rounded-[3.5rem] shadow-[0_32px_64px_-12px_rgba(69,26,3,0.15)] p-12 border-2 border-orange-100">
            <div class="mb-10 text-center">
                <h2 class="text-2xl font-black text-[#2d1a0f] tracking-tight">Welcome Back</h2>
                <p class="text-slate-500 text-sm mt-1 font-medium">Verify your identity to access</p>
            </div>

            <form id="login-form" class="space-y-6">
                <div class="space-y-2">
                    <!-- Label com cor mais escura para contraste -->
                    <label class="text-[11px] font-black uppercase tracking-[0.1em] text-[#451a03] ml-1">Corporate Email</label>
                    <div class="relative group">
                        <!-- Ícone com cor mais viva -->
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 group-focus-within:text-[#d97706] transition-colors">email</span>
                        <input type="email" id="email" placeholder="name@osakacorp.com" autocomplete="email" required
                            class="w-full pl-12 pr-5 py-4 bg-white border-2 border-orange-100 rounded-[1.5rem] outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-[#d97706] transition-all text-[#2d1a0f] font-bold placeholder:text-slate-300">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[11px] font-black uppercase tracking-[0.1em] text-[#451a03] ml-1">Security Key</label>
                    <div class="relative group">
                        <span class="material-icons-round absolute left-4 top-1/2 -translate-y-1/2 text-orange-400 group-focus-within:text-[#d97706] transition-colors">lock</span>
                        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required
                            class="w-full pl-12 pr-5 py-4 bg-white border-2 border-orange-100 rounded-[1.5rem] outline-none focus:ring-4 focus:ring-orange-500/10 focus:border-[#d97706] transition-all text-[#2d1a0f] font-bold placeholder:text-slate-300">
                    </div>
                </div>

                <div class="flex items-center px-1">
                    <input type="checkbox" id="remember" class="w-4 h-4 text-[#d97706] border-orange-300 rounded focus:ring-[#d97706] cursor-pointer">
                    <label for="remember" class="ml-2 text-xs font-bold text-slate-600 cursor-pointer select-none">Keep session active</label>
                </div>

                <button type="submit"
                    class="w-full bg-[#1e130c] hover:bg-black text-white font-black py-5 rounded-[1.5rem] shadow-xl shadow-orange-900/10 transition-all active:scale-[0.98] uppercase text-xs tracking-[0.2em]">
                    Sign in to System
                </button>
            </form>

            <!-- Quick Access Section -->
            <div class="mt-10 pt-8 border-t-2 border-orange-50">
                <p class="text-[10px] font-black uppercase tracking-[0.2em] text-orange-400 text-center mb-5">Test Demo Access Points</p>
                <div class="grid grid-cols-3 gap-2">
                    <!-- Botões com fundo branco e bordas visíveis -->
                    <button type="button" onclick="fillLogin('admin@osakacorp.com')"
                        class="py-3 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-2xl text-[10px] font-black transition-all uppercase">Admin</button>
                    <button type="button" onclick="fillLogin('tech@osakacorp.com')"
                        class="py-3 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-2xl text-[10px] font-black transition-all uppercase">Tech</button>
                    <button type="button" onclick="fillLogin('user@osakacorp.com')"
                        class="py-3 bg-white hover:bg-orange-50 text-slate-700 hover:text-[#d97706] border-2 border-orange-100 rounded-2xl text-[10px] font-black transition-all uppercase">User</button>
                </div>
            </div>
        </div>

        <p class="text-center text-[#451a03] text-[10px] font-bold uppercase tracking-[0.3em] mt-12 opacity-40">
            &copy; 2026 OsakaCorp Infrastructure <br> Authorized Personnel Only
        </p>
    </div>

    <script>
        function fillLogin(email) {
            const e = document.getElementById('email');
            const p = document.getElementById('password');
            e.value = email; p.value = 'teste123';
            // Feedback visual mais forte
            e.classList.add('border-[#d97706]');
            setTimeout(() => e.classList.remove('border-[#d97706]'), 600);
        }
    </script>
</body>
</html>
