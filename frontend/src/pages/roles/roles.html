<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Roles & Permissions | ServiceDesk</title>
    <script type="module" src="/src/pages/roles/roles.ts"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
</head>

<body class="bg-slate-50 min-h-screen">
    <!-- Loader Global -->
    <!-- Loader Global (Com a classe 'hidden' adicionada) -->
<div id="global-loader" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm">
  <div class="relative">
    <div class="h-12 w-12 rounded-full border-4 border-slate-200 border-t-blue-600 animate-spin"></div>
  </div>
</div>
    <div id="sidebar-container"></div>

    <main class="ml-64 p-10 max-w-6xl">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">Roles & Permissions</h1>
                <p class="text-slate-500 font-medium">Define access levels and system capabilities.</p>
            </div>
            <button onclick="window.openRoleModal()"
                class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-bold shadow-xl shadow-blue-500/20 hover:bg-blue-700 transition-all flex items-center gap-2">
                <span class="material-icons-round">add_moderator</span> Create New Role
            </button>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6" id="roles-grid">
            <!-- Roles cards will be injected here -->
        </div>
    </main>

    <!-- ROLE MODAL -->
    <div id="role-modal"
        class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-[100] p-4">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl p-10 overflow-hidden">
            <h2 id="modal-title" class="text-2xl font-black text-slate-800 mb-2 text-center">Configure Role</h2>
            <p class="text-slate-400 text-center text-sm mb-8 font-medium">Define a name and select permissions.</p>

            <form id="role-form" class="space-y-6">
                <input type="hidden" id="field-role-id">
                <div class="space-y-1.5">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">Role Display
                        Name</label>
                    <input type="text" id="field-role-name" placeholder="e.g. Senior Technician" required
                        class="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl outline-none focus:ring-4 focus:ring-blue-500/10 focus:border-blue-500 transition-all font-bold">
                </div>

                <div class="space-y-4">
                    <label class="text-[10px] font-black uppercase tracking-widest text-slate-400 ml-1">System
                        Capabilities</label>
                    <div class="grid grid-cols-1 gap-3 max-h-60 overflow-y-auto pr-2" id="permissions-list">
                        <!-- Checkboxes will be injected here -->
                    </div>
                </div>

                <div class="flex gap-4 pt-4">
                    <button type="button" onclick="window.closeRoleModal()"
                        class="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600">Cancel</button>
                    <button type="submit"
                        class="flex-[2] bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-xl shadow-blue-500/20 hover:bg-blue-700 active:scale-95 transition-all">
                        Save Role
                    </button>
                </div>
            </form>
        </div>
    </div>
</body>

</html>
